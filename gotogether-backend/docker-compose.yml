version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/gotogether
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=local_access_secret_123
      - JWT_REFRESH_SECRET=local_refresh_secret_123
    depends_on:
      - mongo
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
